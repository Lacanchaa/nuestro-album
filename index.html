  <!-- Aplicar tema guardado antes de mostrar la aplicación -->

  <script>
    (function () {
      try {
        const raw = localStorage.getItem('album_settings');

        if (!raw) return;

        const settings = JSON.parse(raw);

        if (settings && settings.theme) {
          document.documentElement.setAttribute(
            'data-theme',
            settings.theme
          );
        }
      } catch (error) {
        console.warn(
          'No se pudo cargar el tema guardado:',
          error
        );
      }
    })();
  </script>

</head>

<body>

  <!-- =========================================================

  <div
    id="screen-auth"

  >

```
<div class="auth-card">

  <div
    class="auth-mark"
    aria-hidden="true"
  >
    ✦
  </div>

  <h1
    class="auth-title"
    id="auth-welcome"
    data-i18n="welcomeTitle"
  >
    Bienvenidos de nuevo
  </h1>

  <p
    class="auth-sub"
    data-i18n="welcomeSub"
  >
    Vuestra historia os espera
  </p>


  <!-- LOGIN -->

  <form
    id="form-login"
    class="auth-form"
  >

    <label class="field">
      <span data-i18n="username">
        Usuario
      </span>

      <input
        type="text"
        id="login-username"
        autocomplete="username"
        required
      >
    </label>


    <label class="field">
      <span data-i18n="password">
        Contraseña
      </span>

      <input
        type="password"
        id="login-password"
        autocomplete="current-password"
        required
      >
    </label>


    <label class="checkbox-field">

      <input
        type="checkbox"
        id="login-remember"
        checked
      >

      <span data-i18n="staySignedIn">
        Mantener sesión iniciada
      </span>

    </label>


    <p
      class="auth-error"
      id="login-error"
    ></p>


    <button
      type="submit"
      class="btn btn-primary"
      data-i18n="signIn"
    >
      Entrar
    </button>


    <div class="auth-links">

      <button
        type="button"
        class="link-btn"
        data-goto="register"
        data-i18n="createAccount"
      >
        Crear cuenta
      </button>

      <button
        type="button"
        class="link-btn"
        data-goto="recover"
        data-i18n="forgotPassword"
      >
        Olvidé mi contraseña
      </button>

    </div>

  </form>


  <!-- REGISTRO -->

  <form
    id="form-register"
    class="auth-form hidden"
  >

    <label class="field">

      <span data-i18n="displayName">
        Vuestro nombre / apodo
      </span>

      <input
        type="text"
        id="reg-displayname"
        required
        maxlength="60"
      >

    </label>


    <label class="field">

      <span data-i18n="username">
        Usuario
      </span>

      <input
        type="text"
        id="reg-username"
        autocomplete="username"
        required
        minlength="3"
        maxlength="30"
      >

    </label>


    <label class="field">

      <span data-i18n="password">
        Contraseña
      </span>

      <input
        type="password"
        id="reg-password"
        autocomplete="new-password"
        required
        minlength="6"
      >

    </label>


    <label class="field">

      <span data-i18n="confirmPassword">
        Confirmar contraseña
      </span>

      <input
        type="password"
        id="reg-password2"
        autocomplete="new-password"
        required
        minlength="6"
      >

    </label>


    <label class="field">

      <span data-i18n="securityQuestion">
        Pregunta de seguridad
      </span>

      <input
        type="text"
        id="reg-secquestion"
        required
        placeholder="¿Dónde fue vuestra primera cita?"
      >

    </label>


    <label class="field">

      <span data-i18n="securityAnswer">
        Respuesta
      </span>

      <input
        type="text"
        id="reg-secanswer"
        required
      >

    </label>


    <p
      class="auth-error"
      id="register-error"
    ></p>


    <button
      type="submit"
      class="btn btn-primary"
      data-i18n="createAccount"
    >
      Crear cuenta
    </button>


    <div class="auth-links">

      <button
        type="button"
        class="link-btn"
        data-goto="login"
        data-i18n="backToLogin"
      >
        Volver a entrar
      </button>

    </div>

  </form>


  <!-- RECUPERACIÓN -->

  <form
    id="form-recover"
    class="auth-form hidden"
  >

    <label class="field">

      <span data-i18n="username">
        Usuario
      </span>

      <input
        type="text"
        id="rec-username"
        required
      >

    </label>


    <div
      id="rec-step2"
      class="hidden"
    >

      <label class="field">

        <span id="rec-question-label">
          Pregunta de seguridad
        </span>

        <input
          type="text"
          id="rec-answer"
          required
        >

      </label>


      <label class="field">

        <span data-i18n="newPassword">
          Nueva contraseña
        </span>

        <input
          type="password"
          id="rec-newpass"
          minlength="6"
          required
        >

      </label>

    </div>


    <p
      class="auth-error"
      id="recover-error"
    ></p>


    <p
      class="auth-ok"
      id="recover-ok"
    ></p>


    <button
      type="button"
      id="rec-step1-btn"
      class="btn btn-primary"
      data-i18n="continueBtn"
    >
      Continuar
    </button>


    <button
      type="button"
      id="rec-step2-btn"
      class="btn btn-primary hidden"
      data-i18n="resetPassword"
    >
      Restablecer contraseña
    </button>


    <div class="auth-links">

      <button
        type="button"
        class="link-btn"
        data-goto="login"
        data-i18n="backToLogin"
      >
        Volver a entrar
      </button>

    </div>

  </form>

</div>
```

  </div>

```
<div class="auth-card">

  <div
    class="auth-mark"
    aria-hidden="true"
  >
    🔒
  </div>


  <h1
    class="auth-title"
    data-i18n="lockedTitle"
  >
    Sesión bloqueada
  </h1>


  <p
    class="auth-sub"
    data-i18n="lockedSub"
  >
    Introduce tu contraseña para continuar
  </p>


  <form
    id="form-unlock"
    class="auth-form"
  >

    <label class="field">

      <span data-i18n="password">
        Contraseña
      </span>

      <input
        type="password"
        id="unlock-password"
        required
        autocomplete="current-password"
      >

    </label>


    <p
      class="auth-error"
      id="unlock-error"
    ></p>


    <button
      type="submit"
      class="btn btn-primary"
      data-i18n="unlock"
    >
      Desbloquear
    </button>

  </form>

</div>

  <button

</aside>


<div
  class="sidebar-backdrop"
  id="sidebar-backdrop"
></div>


<main
  class="content"
  id="content"
>

  <header class="topbar">

    <button
      class="hamburger"

  <!-- =========================================================

  <div
    id="music-player"
    class="music-player hidden"
  >

```
<button
  id="mp-toggle"
  class="mp-toggle"
  type="button"
>
  ▶
</button>


<div class="mp-info">

  <span
    id="mp-track-name"
    class="mp-track-name"
    data-i18n="noTrack"
  >
    Sin música
  </span>


  <input
    id="mp-seek"
    type="range"
    min="0"
    max="100"
    value="0"
    class="mp-seek"
  >

</div>


<button
  id="mp-shuffle"
  class="icon-btn small"
  title="Aleatorio"
  type="button"
>
  ⤨
</button>


<button
  id="mp-repeat"
  class="icon-btn small"
  title="Repetir"
  type="button"
>
  ↻
</button>


<input
  id="mp-volume"
  type="range"
  min="0"
  max="1"
  step="0.01"
  value="0.7"
  class="mp-volume"
>


<button
  id="mp-list"
  class="icon-btn small"
  title="Playlist"
  type="button"
>
  ♫
</button>


<audio
  id="mp-audio"
  preload="metadata"
></audio>
```
